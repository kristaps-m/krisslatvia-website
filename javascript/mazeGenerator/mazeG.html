    <div style="align-content: center;">

        <button id="newMazeBtnRecursive_1" style="display: none; margin-top: 0.5rem;" onclick="xDang()">New Maze</button>
        <button id="solveBtnRecursive_1" style="display: none; margin-top: 0.5rem;">Show shortest path</button>
    </div>
    <br>
    <canvas
      id="mazeGenCanvas"
      style="padding: 0.45rem; border: 2px solid #747373; background-color: white"
    ></canvas>
